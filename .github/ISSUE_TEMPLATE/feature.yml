name: Feature
description: A bounded user-facing or technical capability
title: ""
labels:
  - type:feature
body:
  - type: markdown
    attributes:
      value: Describe one independently verifiable change. Add `agent-ready` only after the specification is complete.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What outcome should this issue produce?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What work belongs in this issue?
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What related work is explicitly excluded?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Provide a checklist of observable, testable outcomes.
      value: |
        - [ ]
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Which unit, integration, browser, and manual checks should demonstrate completion? Explain when a test level is not applicable.
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies and context
      description: Link prerequisite issues, documents, or decisions. Write "None" if there are none.
    validations:
      required: true
  - type: checkboxes
    id: readiness
    attributes:
      label: Agent readiness
      description: Complete specification review before adding the `agent-ready` label.
      options:
        - label: Claude has reviewed the goal, scope, non-goals, acceptance criteria, and verification plan
        - label: Claude findings have been incorporated or explicitly resolved in the issue discussion
