services:
  migrate:
    build:
      context: .
      target: api-runtime
    command:
      ["pnpm", "--filter", "@receipt-report/database", "db:migrate:deploy"]
    environment:
      DATABASE_URL: file:/data/receipt-report.db
    volumes:
      - receipt-data:/data

  api:
    build:
      context: .
      target: api-runtime
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: file:/data/receipt-report.db
      STORAGE_PATH: /data/documents
      WEB_DIST_DIR: /app/apps/web/dist
    ports:
      - "${RECEIPT_REPORT_PORT:-3000}:3000"
    volumes:
      - receipt-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/v1/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  worker:
    build:
      context: .
      target: worker-runtime
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: file:/data/receipt-report.db
      STORAGE_PATH: /data/documents
      WORKER_READY_FILE: /tmp/receipt-report-worker.ready
      NORMALIZATION_VERIFY_RENDERER: "true"
    volumes:
      - receipt-data:/data
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/receipt-report-worker.ready"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    stop_grace_period: 10s
    network_mode: none
    mem_limit: 768m
    pids_limit: 128
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777

volumes:
  receipt-data:
